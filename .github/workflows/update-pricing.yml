name: Update LLM Pricing Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch and update pricing
        run: |
          # Fetch all models from OpenRouter
          curl -s https://openrouter.ai/api/v1/models > all_models.json
          
          # Target models that appear in Kannu usage telemetry.
          TARGET_MODELS=(
            "anthropic/claude-3-haiku"
            "anthropic/claude-sonnet-4"
            "anthropic/claude-opus-4"
            "openai/gpt-4o-mini"
            "openai/gpt-4o"
            "openai/gpt-4.1-mini"
            "openai/gpt-4.1"
            "openai/gpt-5-nano"
            "openai/gpt-5-mini"
            "openai/gpt-5"
            "openai/o4-mini"
            "openai/o3"
          )
          
          # Filter and format using jq
          # We extract the specific models and their pricing (input/output)
          # Note: OpenRouter pricing values are already stored per token; keep them as-is.
          
          echo "{" > pricing_new.json
          echo "  \"models\": [" >> pricing_new.json
          
          first=true
          for model_id in "${TARGET_MODELS[@]}"; do
            if [ "$first" = false ]; then echo "," >> pricing_new.json; fi
            
            # Extract name and pricing for the specific model
            model_data=$(jq -c --arg ID "$model_id" '.data[] | select(.id == $ID)' all_models.json)
            name=$(echo $model_data | jq -r '.name')
            prompt_price=$(echo $model_data | jq -r '.pricing.prompt')
            completion_price=$(echo $model_data | jq -r '.pricing.completion')
            
            echo "    {" >> pricing_new.json
            echo "      \"id\": \"$model_id\"," >> pricing_new.json
            echo "      \"name\": \"$name\"," >> pricing_new.json
            echo "      \"pricing\": {" >> pricing_new.json
            echo "        \"prompt\": \"$prompt_price\"," >> pricing_new.json
            echo "        \"completion\": \"$completion_price\"" >> pricing_new.json
            echo "      }" >> pricing_new.json
            echo "    }" >> pricing_new.json
            
            first=false
          done

          # Cursor labels some events as composer/cursor internal model names.
          # Keep a stable estimated fallback so those events are not silently unpriced.
          echo "," >> pricing_new.json
          echo "    {" >> pricing_new.json
          echo "      \"id\": \"cursor/composer-default\"," >> pricing_new.json
          echo "      \"name\": \"Cursor Composer (Estimated)\"," >> pricing_new.json
          echo "      \"pricing\": {" >> pricing_new.json
          echo "        \"prompt\": \"0.00000015\"," >> pricing_new.json
          echo "        \"completion\": \"0.0000006\"" >> pricing_new.json
          echo "      }" >> pricing_new.json
          echo "    }" >> pricing_new.json
          
          echo "  ]," >> pricing_new.json
          echo "  \"last_updated\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"" >> pricing_new.json
          echo "}" >> pricing_new.json
          
          # Move to the final location
          mkdir -p Kannu/managers/LLMUsage
          mv pricing_new.json Kannu/managers/LLMUsage/pricing.json
          
          # Cleanup
          rm all_models.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Kannu/managers/LLMUsage/pricing.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update llm pricing data [skip ci]"
            git push
          fi
