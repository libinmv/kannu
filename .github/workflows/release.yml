name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Metal Toolchain
        run: |
          sudo xcodebuild -runFirstLaunch || true
          MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          if [ "$MAJOR" -ge 26 ]; then
            downloaded=false
            for i in 1 2 3 4 5; do
              if sudo xcodebuild -downloadComponent MetalToolchain; then downloaded=true; break; fi
              sleep 10
            done
            if [ "$downloaded" = false ] && ! xcrun -f metal >/dev/null 2>&1; then
              echo "::error::Metal Toolchain download failed after 5 attempts and metal is unavailable."
              exit 1
            fi
          else
            echo "macOS $MAJOR: Metal ships with Xcode, skipping download."
          fi

      - name: Build Release App
        run: |
          sudo DevToolsSecurity -enable

          if ! plutil_out=$(plutil -remove com.apple.security.mach-services DynamicIsland/DynamicIsland.entitlements 2>&1); then
            if printf '%s' "$plutil_out" | grep -q "No value to remove"; then
              echo "mach-services entitlement already absent, continuing."
            else
              echo "::error::plutil failed to modify entitlements: $plutil_out"
              exit 1
            fi
          fi

          xcodebuild build \
            -project DynamicIsland.xcodeproj \
            -scheme DynamicIsland \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=YES

      - name: Create DMG
        run: |
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh build/Build/Products/Release/Kannu.app build/Kannu.dmg

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kannu-dmg
          path: build/Kannu.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Kannu.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
